# Cloudflare Tunnel Configuration
# Replace YOUR_TUNNEL_ID with your actual tunnel ID
# Replace YOUR_DOMAIN with your domain

tunnel: YOUR_TUNNEL_ID
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # Route all traffic to nginx
  - hostname: memories.YOUR_DOMAIN.com
    service: http://nginx:80
    originRequest:
      noTLSVerify: true
      # Increased timeouts for large video uploads from phone
      connectTimeout: 120s
      # Keep-alive to prevent connection drops during upload
      keepAliveTimeout: 120s
      keepAliveConnections: 10
      # Disable chunked encoding issues  
      disableChunkedEncoding: false
      # HTTP/2 origin for better performance
      http2Origin: true
      # Extend proxy timeouts
      originServerName: ""
  
  # Catch-all rule (required)
  - service: http_status:404